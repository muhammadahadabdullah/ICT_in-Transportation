name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main] # or master, depending on your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://Ahadabdullah07:$HF_TOKEN@huggingface.co/spaces/Ahadabdullah07/Ride-sharing-as-a-community-solution main
